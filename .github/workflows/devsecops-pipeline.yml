# ============================================================
# DevSecOps Security Pipeline
#
# HOW TO CUSTOMIZE:
# 1. Set SEVERITY_THRESHOLD to match your risk tolerance
# 2. Enable/disable individual jobs by setting their `if:` condition
# 3. Add your SONAR_TOKEN secret in GitHub repo settings for SonarCloud
# 4. The OPA policy step scans any YAML file under paths matching
#    MANIFEST_PATHS — update this to match your directory structure
# ============================================================

name: DevSecOps Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  SEVERITY_THRESHOLD: "HIGH,CRITICAL"   # TUNE: set to CRITICAL only for lower noise
  MANIFEST_PATHS: "./apps,./k8s"        # TUNE: directories containing K8s manifests

jobs:
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — secrets deleted in later commits are still exposed

      - name: Install gitleaks
        run: |
          VERSION="8.24.3"
          curl -sL "https://github.com/zricethezav/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      # On push: scan the full working directory (avoids commit-range ambiguity on new repos)
      # On pull_request: scan only commits in the PR diff
      - name: Gitleaks scan (push — full repo)
        if: github.event_name == 'push'
        run: gitleaks detect --source . --redact --exit-code 1 -v

      - name: Gitleaks scan (pull_request — commit range)
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect --source . --redact --exit-code 1 -v \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          # TUNE: add/remove rulesets from https://semgrep.dev/r
          config: >-
            p/python
            p/docker
            p/kubernetes
            p/owasp-top-ten
          generateSarif: true
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: ${{ env.SEVERITY_THRESHOLD }}
          exit-code: 1
          # TUNE: add --ignore-unfixed to skip CVEs with no available fix
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  iac-scan:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          # TUNE: add/remove frameworks that apply to your stack
          framework: terraform,kubernetes,dockerfile,github_actions
          soft_fail: false
          output_format: sarif
          output_file_path: checkov.sarif
      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

  opa-policy:
    name: OPA Policy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OPA
        run: |
          curl -sL -o opa https://openpolicyagent.org/downloads/v0.62.1/opa_linux_amd64_static
          chmod +x opa && sudo mv opa /usr/local/bin/
      - name: Validate manifests against OPA policies
        run: |
          # TUNE: update MANIFEST_PATHS to match your repo structure
          find . -name "*.yaml" \( -path "*/apps/*" -o -path "*/k8s/*" \) | while read f; do
            kind=$(grep "^kind:" "$f" 2>/dev/null | head -1 | awk '{print $2}')
            [ "$kind" = "Deployment" ] || continue
            echo "Checking: $f"
            result=$(opa eval \
              --data policies/opa/k8s-security.rego \
              --input "$f" \
              --format raw \
              "data.kubernetes.security.deny" 2>/dev/null)
            if [ "$result" != "[]" ]; then
              echo "POLICY VIOLATION in $f:"
              echo "$result"
              exit 1
            fi
          done
          echo "All manifests passed OPA policies."

  security-gate:
    name: Security Gate (all must pass)
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, container-scan, iac-scan, opa-policy]
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          declare -A results
          results[secret-scan]="${{ needs.secret-scan.result }}"
          results[sast]="${{ needs.sast.result }}"
          results[container-scan]="${{ needs.container-scan.result }}"
          results[iac-scan]="${{ needs.iac-scan.result }}"
          results[opa-policy]="${{ needs.opa-policy.result }}"

          failed=0
          for job in "${!results[@]}"; do
            if [ "${results[$job]}" != "success" ]; then
              echo "FAILED: $job → ${results[$job]}"
              failed=1
            else
              echo "PASSED: $job"
            fi
          done

          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "Security gate FAILED. Fix the jobs above before merging."
            exit 1
          fi
          echo ""
          echo "All security gates passed."
