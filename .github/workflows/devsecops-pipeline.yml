# ============================================================
# DevSecOps Security Pipeline
#
# HOW TO CUSTOMIZE:
# 1. Set SEVERITY_THRESHOLD to match your risk tolerance
# 2. Enable/disable individual jobs by setting their `if:` condition
# 3. Add your SONAR_TOKEN secret in GitHub repo settings for SonarCloud
# 4. The OPA policy step scans any YAML file under paths matching
#    MANIFEST_PATHS — update this to match your directory structure
# ============================================================

name: DevSecOps Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  SEVERITY_THRESHOLD: "HIGH,CRITICAL"   # TUNE: set to CRITICAL only for lower noise
  MANIFEST_PATHS: "./apps,./k8s"        # TUNE: directories containing K8s manifests

jobs:
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — secrets in old commits are still leaked
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          # TUNE: add/remove rulesets from https://semgrep.dev/r
          config: >-
            p/python
            p/docker
            p/kubernetes
            p/owasp-top-ten
          generateSarif: true
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: ${{ env.SEVERITY_THRESHOLD }}
          exit-code: 1
          # TUNE: add --ignore-unfixed to skip CVEs with no available fix
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  iac-scan:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          # TUNE: add/remove frameworks that apply to your stack
          framework: terraform,kubernetes,dockerfile,github_actions
          soft_fail: false
          output_format: sarif
          output_file_path: checkov.sarif
      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

  opa-policy:
    name: OPA Policy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OPA
        run: |
          curl -sL -o opa https://openpolicyagent.org/downloads/v0.62.1/opa_linux_amd64_static
          chmod +x opa && sudo mv opa /usr/local/bin/
      - name: Validate manifests against OPA policies
        run: |
          # TUNE: update MANIFEST_PATHS to match your repo structure
          find . -name "*.yaml" \( -path "*/apps/*" -o -path "*/k8s/*" \) | while read f; do
            kind=$(grep "^kind:" "$f" 2>/dev/null | head -1 | awk '{print $2}')
            [ "$kind" = "Deployment" ] || continue
            echo "Checking: $f"
            result=$(opa eval \
              --data policies/opa/k8s-security.rego \
              --input "$f" \
              --format raw \
              "data.kubernetes.security.deny" 2>/dev/null)
            if [ "$result" != "[]" ]; then
              echo "POLICY VIOLATION in $f:"
              echo "$result"
              exit 1
            fi
          done
          echo "All manifests passed OPA policies."

  security-gate:
    name: Security Gate (all must pass)
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, container-scan, iac-scan, opa-policy]
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          results="${{ needs.secret-scan.result }} ${{ needs.sast.result }} \
                   ${{ needs.container-scan.result }} ${{ needs.iac-scan.result }} \
                   ${{ needs.opa-policy.result }}"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "Security gate FAILED. One or more checks did not pass."
              exit 1
            fi
          done
          echo "All security gates passed."
